AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Zimeleni Scholar Transport - Lambda Backend API

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12
    CodeUri: src/
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON
    Environment:
      Variables:
        TABLE_NAME: !Ref DynamoTableName
        JWT_SECRET: !Ref JwtSecret
        PAYFAST_MERCHANT_ID: !Ref PayFastMerchantId
        PAYFAST_MERCHANT_KEY: !Ref PayFastMerchantKey
        PAYFAST_PASSPHRASE: !Ref PayFastPassphrase
        PAYFAST_SANDBOX: !Ref PayFastSandbox
  Api:
    TracingEnabled: true

Parameters:
  DynamoTableName:
    Type: String
    Default: zimeleni-transport
    Description: Name of the DynamoDB table
  S3BucketName:
    Type: String
    Default: placeholder
    Description: Name of the S3 bucket used for file storage
  PayFastMerchantId:
    Type: String
    Default: placeholder
    NoEcho: true
    Description: PayFast Merchant ID
  PayFastMerchantKey:
    Type: String
    Default: placeholder
    NoEcho: true
    Description: PayFast Merchant Key
  PayFastPassphrase:
    Type: String
    Default: placeholder
    NoEcho: true
    Description: PayFast Passphrase for signature generation
  PayFastSandbox:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Use PayFast sandbox environment
  JwtSecret:
    Type: String
    Default: change-me-in-production
    NoEcho: true
    Description: Secret key used to sign JWT tokens

Resources:

  # ── API Gateway ────────────────────────────────────────────────────────────
  TransportApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Description: Zimeleni Scholar Transport REST API
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"
        AllowOrigin: "'*'"

  # ── Auth ───────────────────────────────────────────────────────────────────
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: auth.handler.lambda_handler
      Description: POST /auth/login | POST /auth/register | POST /auth/logout
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /auth/login
            Method: post
        Register:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /auth/register
            Method: post
        Logout:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /auth/logout
            Method: post

  # ── Owners ─────────────────────────────────────────────────────────────────
  OwnersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: owners.handler.lambda_handler
      Description: GET|POST /owners | GET|PUT|DELETE /owners/{id}
      Events:
        ListOwners:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /owners
            Method: get
        CreateOwner:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /owners
            Method: post
        GetOwner:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /owners/{id}
            Method: get
        UpdateOwner:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /owners/{id}
            Method: put
        DeleteOwner:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /owners/{id}
            Method: delete

  # ── Vehicles ───────────────────────────────────────────────────────────────
  VehiclesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: vehicles.handler.lambda_handler
      Description: GET|POST /vehicles | GET|PUT /vehicles/{reg_number}
      Events:
        ListVehicles:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /vehicles
            Method: get
        CreateVehicle:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /vehicles
            Method: post
        GetVehicle:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /vehicles/{reg_number}
            Method: get
        UpdateVehicle:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /vehicles/{reg_number}
            Method: put

  # ── Drivers ────────────────────────────────────────────────────────────────
  DriversFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: drivers.handler.lambda_handler
      Description: GET|POST /drivers | PUT /drivers/{id}
      Events:
        ListDrivers:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /drivers
            Method: get
        CreateDriver:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /drivers
            Method: post
        UpdateDriver:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /drivers/{id}
            Method: put

  # ── Meetings ───────────────────────────────────────────────────────────────
  MeetingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: meetings.handler.lambda_handler
      Description: GET|POST /meetings | GET|PUT|DELETE /meetings/{id} | POST /meetings/{id}/attendance
      Events:
        ListMeetings:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /meetings
            Method: get
        CreateMeeting:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /meetings
            Method: post
        GetMeeting:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /meetings/{id}
            Method: get
        UpdateMeeting:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /meetings/{id}
            Method: put
        DeleteMeeting:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /meetings/{id}
            Method: delete
        RecordAttendance:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /meetings/{id}/attendance
            Method: post

  # ── Payments ───────────────────────────────────────────────────────────────
  PaymentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: payments.handler.lambda_handler
      Description: GET /payments | POST /payments/initiate | POST /payments/confirm (PayFast ITN)
      Events:
        ListPayments:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /payments
            Method: get
        InitiatePayment:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /payments/initiate
            Method: post
        ConfirmPayment:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /payments/confirm
            Method: post

  # ── Flags ──────────────────────────────────────────────────────────────────
  FlagsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: flags.handler.lambda_handler
      Description: GET|POST /flags
      Events:
        ListFlags:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /flags
            Method: get
        CreateFlag:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /flags
            Method: post

  # ── Search ─────────────────────────────────────────────────────────────────
  SearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: search.handler.lambda_handler
      Description: GET /search?reg_number=XXX | GET /search?id_number=XXX
      Events:
        Search:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /search
            Method: get

  # ── Files (S3 presigned URLs) ───────────────────────────────────────────────
  FilesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: files.handler.lambda_handler
      Description: GET /files (download) | POST /files (upload) | DELETE /files (delete) - S3 presigned URLs
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref S3BucketName
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref S3BucketName
      Events:
        DownloadFile:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /files
            Method: get
        UploadFile:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /files
            Method: post
        DeleteFile:
          Type: Api
          Properties:
            RestApiId: !Ref TransportApi
            Path: /files
            Method: delete

Outputs:
  TransportApiUrl:
    Description: API Gateway base URL
    Value: !Sub "https://${TransportApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/prod/"
  AuthFunctionArn:
    Value: !GetAtt AuthFunction.Arn
  OwnersFunctionArn:
    Value: !GetAtt OwnersFunction.Arn
  VehiclesFunctionArn:
    Value: !GetAtt VehiclesFunction.Arn
  DriversFunctionArn:
    Value: !GetAtt DriversFunction.Arn
  MeetingsFunctionArn:
    Value: !GetAtt MeetingsFunction.Arn
  PaymentsFunctionArn:
    Value: !GetAtt PaymentsFunction.Arn
  FlagsFunctionArn:
    Value: !GetAtt FlagsFunction.Arn
  SearchFunctionArn:
    Value: !GetAtt SearchFunction.Arn
  FilesFunctionArn:
    Value: !GetAtt FilesFunction.Arn
